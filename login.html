<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@2.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
    <link rel="shortcut icon" href="logo.jfif" type="image/x-icon">
    <title>Login</title>
</head>
<body>
    <div class="login">
        <form class="container" id="loginForm">
            <!-- mini logo acima do título -->
            <img src="logo.jfif" alt="Mini Logo" class="login__mini-logo"> 
          <!---------------------------------------------------------------->
            <h1 class="login__title">Login</h1>
            <div class="login__content">
                <!-- Email Input -->
                <div class="login__box">
                    <i class="ri-user-3-line login__icon"></i>
                    <div class="login__box-input">
                        <input type="email" required class="login__input" id="login-email" placeholder="">
                        <label for="login-email" class="login__label">Email</label>
                    </div>
                </div>
                <!-- Senha Input -->
                <div class="login__box">
                    <i class="ri-lock-2-line login__icon"></i>
                    <div class="login__box-input">
                        <input type="password" required class="login__input" id="login-pass" placeholder=" ">
                        <label for="login-pass" class="login__label">Senha</label>
                        <i class="ri-eye-off-line login__eye" id="login-eye"></i>
                    </div>
                </div>
            </div>
            <!-- Button entrar -->
            <button type="submit" class="login__button" disabled>Login</button>
        </form>
    </div>
    <script src="login.js"></script>
</body>
</html>
