<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@2.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="shortcut icon" href="logoBran.jfif" type="image/x-icon">
    <link rel="stylesheet" href="cadastro.css">
    <title>Cadastro</title>
</head>
<body>
    <div class="login">
        <form class="container" id="loginForm" action="" method="post">
            <a href="sistem.html">
                <img src="Logo.jpg" alt="Mini Logo" class="login__mini-logo"> 
            </a>
            <h1 class="login__title">Cadastro Cliente</h1>
            <div class="login__content">
                <!-- Nome da Empresa ou Pessoal -->
                <div class="login__box">
                    <i class="ri-user-line login__icon"></i>
                    <div class="login__box-input">
                        <input type="text" required class="login__input" id="login-name" name="nome" placeholder=" ">
                        <label for="login-name" class="login__label">Nome da Empresa ou Pessoal</label>
                    </div>
                </div>

                <!-- Email -->
                <div class="login__box">
                    <i class="ri-user-3-line login__icon"></i>
                    <div class="login__box-input">
                        <input type="email" required class="login__input" id="login-email" name="email" placeholder=" ">
                        <label for="login-email" class="login__label">Email</label>
                    </div>
                </div>
                
                <!-- Senha -->
                <div class="login__box">
                    <i class="ri-lock-line login__icon"></i>
                    <div class="login__box-input">
                        <input type="password" required class="login__input" id="login-senha" name="senha" placeholder=" ">
                        <label for="login-senha" class="login__label">Senha</label>
                        <i class="login__eye ri-eye-line" title="Mostrar Senha"></i> <!-- Ícone do olho -->
                    </div>
                </div>
                
                <!-- CPF -->
                <div class="login__box">
                    <i class="ri-file-text-line login__icon"></i>
                    <div class="login__box-input">
                        <input type="text" required class="login__input" id="login-cpf" name="cpf" placeholder=" ">
                        <label for="login-cpf" class="login__label">CPF</label>
                    </div>
                </div>

                <!-- Orçamento -->
                <div class="login__box">
                    <i class="ri-money-dollar-circle-line login__icon"></i>
                    <div class="login__box-input">
                        <input type="number" required class="login__input" id="receita-gerada" name="receita" placeholder=" ">
                        <label for="receita-gerada" class="login__label">Orçamento</label>
                    </div>
                </div>
                
                <!-- Telefone -->
                <div class="login__box">
                    <i class="ri-phone-line login__icon"></i>
                    <div class="login__box-input">
                        <input type="text" required class="login__input" id="login-phone" name="telefone" placeholder=" ">
                        <label for="login-phone" class="login__label">Telefone</label>
                    </div>
                </div>
            </div>
            
            <button type="submit" class="login__button" id="submit-button" disabled>Cadastre-se</button>
        </form>
    </div>
    <script src="cadastro.js"></script>
</body>
</html>
